services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-hub-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    ports:
      - '4000:4000'
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4000/doc').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure
    networks:
      - knowledge-hub-net

  db:
    image: postgres:16-alpine
    container_name: knowledge-hub-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - knowledge-hub-net

  adminer:
    image: adminer
    container_name: knowledge-hub-adminer
    profiles:
      - debug
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:8080'
    restart: unless-stopped
    networks:
      - knowledge-hub-net

networks:
  knowledge-hub-net:
    driver: bridge

volumes:
  postgres-data:
